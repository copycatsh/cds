services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/var/www/frontend/dist:ro
    depends_on:
      - php

  php:
    build:
      context: ./docker/php
    volumes:
      - .:/var/www
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-cds}
      DB_USER: ${POSTGRES_USER:-cds}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-cds_secret}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cds}
      POSTGRES_USER: ${POSTGRES_USER:-cds}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cds_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cds}"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: npm run dev
    depends_on:
      - nginx

volumes:
  pgdata:
